<!DOCTYPE html>
<html lang="nl">
<head>
    <title>MCAD Overzicht</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/png" href="/static/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="home-center">
    <div class="content-fade" style="width: 100%; display: flex; flex-direction: column; align-items: center; opacity: 0; animation: simpleFadeIn 0.4s ease-out forwards;">
        <h1>MCAD Overzicht</h1>
        <p>Analyse op de Marine Cyber Attack Database van NHL Stenden</p>
        <p style="font-size: 0.8rem; margin-top: 1rem; letter-spacing: 0.05em; text-transform: uppercase;"><a href="https://maritimecybersecurity.nl/" target="_blank" style="color: var(--text-secondary); border-bottom: 1px solid rgba(0,0,0,0.1);">maritimecybersecurity.nl</a></p>
        
        {% if table_names %}
        <div class="button-container">
            {% for table in table_names %}
            <button onclick="location.href='/table/{{ table }}'">{{ table }}</button>
            {% endfor %}
        </div>
        {% else %}
        <div class="empty-state">
            <p>Geen tables gevonden, run eerst main.r om data te krijgen</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
